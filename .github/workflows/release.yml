name: Release crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  release:
    types: [published]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish workspace crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.88.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate workspace
        run: |
          cargo fmt --check
          cargo test --workspace --all-targets
          cargo clippy --workspace --all-targets -- -D warnings

      - name: Dry-run publish all crates
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: |
          cargo publish --dry-run -p ratatui-bubbletea-theme

          # On the first release, dependent crates cannot be dry-run published
          # until ratatui-bubbletea-theme exists in the crates.io index. The
          # real publish path below publishes crates in dependency order.
          if cargo search ratatui-bubbletea-theme --limit 1 | grep -q '^ratatui-bubbletea-theme = "0.1.0"'; then
            cargo publish --dry-run -p ratatui-bubbletea-components
            cargo publish --dry-run -p ratatui-tea
          else
            echo "::notice::Skipping dependent crate dry-runs because ratatui-bubbletea-theme 0.1.0 is not indexed on crates.io yet."
          fi

      - name: Publish ratatui-bubbletea-theme
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if cargo search ratatui-bubbletea-theme --limit 5 | grep -q '^ratatui-bubbletea-theme = "0.1.0"'; then
            echo "ratatui-bubbletea-theme 0.1.0 is already published; skipping."
          else
            cargo publish -p ratatui-bubbletea-theme
          fi

      - name: Wait for theme crate indexing
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        run: |
          for attempt in {1..40}; do
            if cargo search ratatui-bubbletea-theme --limit 1 | grep -q '^ratatui-bubbletea-theme = "0.1.0"'; then
              exit 0
            fi
            echo "Waiting for crates.io index update ($attempt/40)..."
            sleep 15
          done
          echo "ratatui-bubbletea-theme 0.1.0 was not visible in the crates.io index in time" >&2
          exit 1

      - name: Publish ratatui-bubbletea-components
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if cargo search ratatui-bubbletea-components --limit 5 | grep -q '^ratatui-bubbletea-components = "0.1.0"'; then
            echo "ratatui-bubbletea-components 0.1.0 is already published; skipping."
          else
            cargo publish -p ratatui-bubbletea-components
          fi

      - name: Publish ratatui-tea
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false') }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if cargo search ratatui-tea --limit 5 | grep -q '^ratatui-tea = "0.1.0"'; then
            echo "ratatui-tea 0.1.0 is already published; skipping."
          else
            cargo publish -p ratatui-tea
          fi
